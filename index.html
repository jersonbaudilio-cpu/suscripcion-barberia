<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suscripción Barbería Altuve</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

.container{
max-width:600px;
margin:auto;
padding:30px;
}

h1{
text-align:center;
color:gold;
}

.plan{
background:#1c1c1c;
padding:20px;
border-radius:10px;
border:1px solid gold;
margin-top:20px;
}

.price{
font-size:28px;
color:gold;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:5px;
border:none;
}

button{
background:gold;
color:black;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>Suscripción Barbería Altuve</h1>

<div class="plan">
<h3>Plan Corte</h3>
<div class="price">40€ / mes</div>
<p>✔ 4 cortes al mes<br>✔ 1 corte por semana</p>
</div>

<div class="plan">
<h3>Plan Corte + Barba</h3>
<div class="price">60€ / mes</div>
<p>✔ 4 servicios al mes</p>
</div>

<h2>Registro</h2>

<input id="nombre" placeholder="Nombre completo">
<input id="telefono" placeholder="Teléfono">

<select id="plan">
<option>4 Cortes - 40€</option>
<option>4 Cortes + Barba - 60€</option>
</select>

<button onclick="registro()">Registrarme</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyIJy0IsJWIB8MGf58OWyCPVSjxjRD1plgq3wBalgnK_urweo5UdLV6gbAw9SPwWeq0zw/exec";

function registro(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let plan=document.getElementById("plan").value;

fetch(API,{
method:"POST",
body:JSON.stringify({
nombre:nombre,
telefono:telefono,
plan:plan
})
})

.then(res=>res.text())
.then(data=>{
alert("Registro guardado correctamente.");
});

}

</script>

</body>
